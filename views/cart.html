<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Giỏ hàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/app.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">ShopIMini</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="/cart">Giỏ hàng</a>
          <a class="nav-link text-white-50" href="/admin/login">Admin</a>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      <h1 class="h3 mb-4">Giỏ hàng</h1>
      <div id="alert" class="alert d-none" role="alert"></div>
      <div id="empty" class="d-none text-muted">Giỏ hàng đang trống.</div>
      <div class="table-responsive">
        <table class="table align-middle bg-white shadow-sm d-none" id="tbl">
          <thead>
            <tr>
              <th></th>
              <th>Sản phẩm</th>
              <th>Giá</th>
              <th>Số lượng</th>
              <th>Tạm tính</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center mt-3 d-none" id="footer">
        <strong>Tổng: <span id="total"></span></strong>
        <a class="btn btn-success" href="/checkout">Thanh toán</a>
      </div>
      <a href="/" class="btn btn-outline-secondary mt-3">← Tiếp tục mua</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const tbody = document.getElementById('tbody');
      const tbl = document.getElementById('tbl');
      const empty = document.getElementById('empty');
      const footer = document.getElementById('footer');
      const totalEl = document.getElementById('total');
      const alertEl = document.getElementById('alert');

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      function formatMoney(n) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
      }

      async function fetchCart() {
        const res = await fetch('/api/cart', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải giỏ hàng');
        return data;
      }

      async function patchQty(productId, quantity) {
        const res = await fetch('/api/cart/' + productId, {
          method: 'PATCH',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không cập nhật được');
        return data;
      }

      async function removeLine(productId) {
        const res = await fetch('/api/cart/' + productId, {
          method: 'DELETE',
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không xóa được');
        return data;
      }

      function render(data) {
        const { items, total } = data;
        tbody.innerHTML = '';
        if (!items.length) {
          tbl.classList.add('d-none');
          footer.classList.add('d-none');
          empty.classList.remove('d-none');
          return;
        }
        empty.classList.add('d-none');
        tbl.classList.remove('d-none');
        footer.classList.remove('d-none');
        totalEl.textContent = formatMoney(total);
        for (const line of items) {
          const p = line.product;
          const img = p.image_url || 'https://placehold.co/80?text=SI';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="table-cart"><img src="${img}" alt="" /></td>
            <td>${p.name}</td>
            <td>${formatMoney(p.price)}</td>
            <td style="max-width:120px">
              <input type="number" min="1" max="${p.stock}" class="form-control form-control-sm qty" data-id="${
                p.id
              }" value="${line.quantity}" />
            </td>
            <td>${formatMoney(line.lineTotal)}</td>
            <td>
              <button type="button" class="btn btn-sm btn-outline-danger btn-remove" data-id="${p.id}">Xóa</button>
            </td>`;
          tbody.appendChild(tr);
        }
        tbody.querySelectorAll('.qty').forEach((input) => {
          input.addEventListener('change', async () => {
            try {
              const q = parseInt(input.value, 10);
              await patchQty(Number(input.dataset.id), q);
              await refresh();
            } catch (e) {
              showAlert(e.message);
              await refresh();
            }
          });
        });
        tbody.querySelectorAll('.btn-remove').forEach((btn) => {
          btn.addEventListener('click', async () => {
            try {
              await removeLine(Number(btn.dataset.id));
              await refresh();
            } catch (e) {
              showAlert(e.message);
            }
          });
        });
      }

      async function refresh() {
        alertEl.classList.add('d-none');
        const data = await fetchCart();
        render(data);
      }

      (async () => {
        try {
          await refresh();
        } catch (e) {
          showAlert(e.message);
        }
      })();
    </script>
  </body>
</html>
