<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Thanh toán</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/app.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">ShopIMini</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="/cart">Giỏ hàng</a>
        </div>
      </div>
    </nav>

    <main class="container pb-5" style="max-width: 720px">
      <h1 class="h3 mb-4">Thanh toán</h1>
      <div id="alert" class="alert d-none" role="alert"></div>
      <div id="summary" class="card shadow-sm mb-4 d-none">
        <div class="card-body">
          <h2 class="h6">Đơn tạm tính</h2>
          <ul class="list-unstyled small mb-0" id="lines"></ul>
          <hr />
          <strong>Tổng: <span id="total"></span></strong>
        </div>
      </div>
      <form id="form" class="card shadow-sm d-none">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label" for="customerName">Họ tên</label>
            <input class="form-control" id="customerName" name="customerName" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="customerAddress">Địa chỉ giao hàng</label>
            <textarea class="form-control" id="customerAddress" name="customerAddress" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">Xác nhận đặt hàng</button>
          <a href="/cart" class="btn btn-link">Quay lại giỏ</a>
        </div>
      </form>
      <div id="empty" class="d-none">
        <p class="text-muted">Giỏ hàng trống — không thể thanh toán.</p>
        <a href="/" class="btn btn-primary">Xem sản phẩm</a>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const summary = document.getElementById('summary');
      const linesEl = document.getElementById('lines');
      const totalEl = document.getElementById('total');
      const form = document.getElementById('form');
      const empty = document.getElementById('empty');
      const submitBtn = document.getElementById('submitBtn');

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      function formatMoney(n) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
      }

      async function fetchCart() {
        const res = await fetch('/api/cart', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải giỏ hàng');
        return data;
      }

      async function checkout(payload) {
        const res = await fetch('/api/checkout', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Đặt hàng thất bại');
        return data;
      }

      (async () => {
        try {
          const cart = await fetchCart();
          if (!cart.items.length) {
            empty.classList.remove('d-none');
            return;
          }
          summary.classList.remove('d-none');
          form.classList.remove('d-none');
          linesEl.innerHTML = '';
          for (const line of cart.items) {
            const li = document.createElement('li');
            li.textContent = `${line.product.name} × ${line.quantity} — ${formatMoney(line.lineTotal)}`;
            linesEl.appendChild(li);
          }
          totalEl.textContent = formatMoney(cart.total);

          form.addEventListener('submit', async (ev) => {
            ev.preventDefault();
            alertEl.classList.add('d-none');
            submitBtn.disabled = true;
            try {
              const customerName = document.getElementById('customerName').value.trim();
              const customerAddress = document.getElementById('customerAddress').value.trim();
              const result = await checkout({ customerName, customerAddress });
              showAlert('Đặt hàng thành công! Mã đơn: #' + result.orderId, 'success');
              form.classList.add('d-none');
              summary.classList.add('d-none');
              empty.classList.remove('d-none');
              empty.innerHTML =
                '<p class="text-success">Cảm ơn bạn. Đơn #' +
                result.orderId +
                ' đã được ghi nhận.</p><a href="/" class="btn btn-primary">Tiếp tục mua</a>';
            } catch (e) {
              showAlert(e.message);
            } finally {
              submitBtn.disabled = false;
            }
          });
        } catch (e) {
          showAlert(e.message);
        }
      })();
    </script>
  </body>
</html>
