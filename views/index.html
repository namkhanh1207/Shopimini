<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Sản phẩm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/css/app.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">ShopIMini</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="/cart">Giỏ hàng</a>
          <a class="nav-link text-white-50" href="/admin/login">Admin</a>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      <h1 class="h3 mb-4">Sản phẩm</h1>
      <div id="alert" class="alert d-none" role="alert"></div>
      <div id="grid" class="row g-4"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const grid = document.getElementById('grid');
      const alertEl = document.getElementById('alert');

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      function formatMoney(n) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
      }

      async function loadProducts() {
        const res = await fetch('/api/products', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải được sản phẩm');
        return data;
      }

      async function addToCart(productId) {
        const res = await fetch('/api/cart', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, quantity: 1 }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không thêm được vào giỏ');
        return data;
      }

      function render(list) {
        grid.innerHTML = '';
        for (const p of list) {
          const col = document.createElement('div');
          col.className = 'col-md-4';
          const img = p.image_url || 'https://placehold.co/400x400?text=ShopIMini';
          col.innerHTML = `
            <div class="card h-100 product-card shadow-sm">
              <img src="${img}" class="card-img-top" alt="${p.name}" />
              <div class="card-body d-flex flex-column">
                <h2 class="h5 card-title">${p.name}</h2>
                <p class="card-text text-muted small flex-grow-1">${p.description || ''}</p>
                <p class="fw-semibold">${formatMoney(p.price)}</p>
                <p class="small text-secondary">Tồn: ${p.stock}</p>
                <button type="button" class="btn btn-primary mt-auto btn-add" data-id="${p.id}" ${
            p.stock < 1 ? 'disabled' : ''
          }>Thêm vào giỏ</button>
              </div>
            </div>`;
          grid.appendChild(col);
        }
        grid.querySelectorAll('.btn-add').forEach((btn) => {
          btn.addEventListener('click', async () => {
            try {
              await addToCart(Number(btn.dataset.id));
              showAlert('Đã thêm vào giỏ hàng', 'success');
            } catch (e) {
              showAlert(e.message);
            }
          });
        });
      }

      (async () => {
        try {
          const list = await loadProducts();
          render(list);
        } catch (e) {
          showAlert(e.message);
        }
      })();
    </script>
  </body>
</html>
