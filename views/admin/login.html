<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Admin đăng nhập</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light d-flex align-items-center" style="min-height: 100vh">
    <div class="container" style="max-width: 420px">
      <h1 class="h4 mb-4 text-center">Admin ShopIMini</h1>
      <div id="alert" class="alert d-none" role="alert"></div>
      <form id="form" class="card shadow-sm">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label" for="username">Tên đăng nhập</label>
            <input class="form-control" id="username" autocomplete="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Mật khẩu</label>
            <input type="password" class="form-control" id="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-dark w-100" id="btn">Đăng nhập</button>
          <a href="/" class="d-block text-center mt-3 small">← Về cửa hàng</a>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const form = document.getElementById('form');
      const btn = document.getElementById('btn');

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      async function checkSession() {
        const res = await fetch('/api/admin/session', { credentials: 'include' });
        if (res.ok) window.location.href = '/admin/products';
      }

      async function login(body) {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Đăng nhập thất bại');
        return data;
      }

      checkSession().catch(() => {});

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        alertEl.classList.add('d-none');
        btn.disabled = true;
        try {
          await login({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          });
          window.location.href = '/admin/products';
        } catch (e) {
          showAlert(e.message);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
