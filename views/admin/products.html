<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Quản lý sản phẩm</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <span class="navbar-brand">Admin — Sản phẩm</span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-light" href="/admin/orders">Đơn hàng</a>
          <button type="button" class="btn btn-sm btn-outline-light" id="logout">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      <div id="alert" class="alert d-none" role="alert"></div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 class="h5 mb-3" id="formTitle">Thêm sản phẩm</h2>
          <form id="form" class="row g-3">
            <input type="hidden" id="editId" />
            <div class="col-md-6">
              <label class="form-label" for="name">Tên</label>
              <input class="form-control" id="name" required />
            </div>
            <div class="col-md-3">
              <label class="form-label" for="price">Giá (VND)</label>
              <input type="number" min="0" step="1000" class="form-control" id="price" required />
            </div>
            <div class="col-md-3">
              <label class="form-label" for="stock">Tồn kho</label>
              <input type="number" min="0" class="form-control" id="stock" required />
            </div>
            <div class="col-12">
              <label class="form-label" for="image_url">URL ảnh</label>
              <input class="form-control" id="image_url" placeholder="https://..." />
            </div>
            <div class="col-12">
              <label class="form-label" for="description">Mô tả</label>
              <textarea class="form-control" id="description" rows="2"></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary" id="saveBtn">Lưu</button>
              <button type="button" class="btn btn-secondary d-none" id="cancelBtn">Hủy sửa</button>
            </div>
          </form>
        </div>
      </div>

      <div class="table-responsive card shadow-sm">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Ảnh</th>
              <th>Tên</th>
              <th>Giá</th>
              <th>Tồn</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const tbody = document.getElementById('tbody');
      const form = document.getElementById('form');
      const formTitle = document.getElementById('formTitle');
      const editId = document.getElementById('editId');
      const cancelBtn = document.getElementById('cancelBtn');
      const saveBtn = document.getElementById('saveBtn');

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      function formatMoney(n) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
      }

      async function guard() {
        const res = await fetch('/api/admin/session', { credentials: 'include' });
        if (!res.ok) window.location.href = '/admin/login';
      }

      async function fetchList() {
        const res = await fetch('/api/admin/products', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải được danh sách');
        return data;
      }

      async function createProduct(body) {
        const res = await fetch('/api/admin/products', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không tạo được');
        return data;
      }

      async function updateProduct(id, body) {
        const res = await fetch('/api/admin/products/' + id, {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không cập nhật được');
        return data;
      }

      async function deleteProduct(id) {
        const res = await fetch('/api/admin/products/' + id, {
          method: 'DELETE',
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không xóa được');
        return data;
      }

      async function logout() {
        await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/admin/login';
      }

      function resetForm() {
        editId.value = '';
        formTitle.textContent = 'Thêm sản phẩm';
        cancelBtn.classList.add('d-none');
        saveBtn.textContent = 'Lưu';
        form.reset();
      }

      function fillForm(p) {
        editId.value = String(p.id);
        formTitle.textContent = 'Sửa sản phẩm #' + p.id;
        cancelBtn.classList.remove('d-none');
        saveBtn.textContent = 'Cập nhật';
        document.getElementById('name').value = p.name;
        document.getElementById('price').value = p.price;
        document.getElementById('stock').value = p.stock;
        document.getElementById('image_url').value = p.image_url || '';
        document.getElementById('description').value = p.description || '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function render(list) {
        tbody.innerHTML = '';
        for (const p of list) {
          const img = p.image_url || 'https://placehold.co/48?text=SI';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${p.id}</td>
            <td><img src="${img}" alt="" width="48" height="48" style="object-fit:cover" /></td>
            <td>${p.name}</td>
            <td>${formatMoney(p.price)}</td>
            <td>${p.stock}</td>
            <td class="text-end">
              <button type="button" class="btn btn-sm btn-outline-primary btn-edit" data-id="${p.id}">Sửa</button>
              <button type="button" class="btn btn-sm btn-outline-danger btn-del" data-id="${p.id}">Xóa</button>
            </td>`;
          tbody.appendChild(tr);
        }
        tbody.querySelectorAll('.btn-edit').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const id = Number(btn.dataset.id);
            const res = await fetch('/api/admin/products/' + id, { credentials: 'include' });
            const p = await res.json();
            if (!res.ok) return showAlert(p.error || 'Không tải sản phẩm');
            fillForm(p);
          });
        });
        tbody.querySelectorAll('.btn-del').forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (!confirm('Xóa sản phẩm này?')) return;
            try {
              await deleteProduct(Number(btn.dataset.id));
              await refresh();
            } catch (e) {
              showAlert(e.message);
            }
          });
        });
      }

      async function refresh() {
        alertEl.classList.add('d-none');
        const list = await fetchList();
        render(list);
      }

      document.getElementById('logout').addEventListener('click', () => logout());
      cancelBtn.addEventListener('click', () => resetForm());

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        alertEl.classList.add('d-none');
        const body = {
          name: document.getElementById('name').value.trim(),
          price: Number(document.getElementById('price').value),
          stock: Number(document.getElementById('stock').value),
          image_url: document.getElementById('image_url').value.trim() || null,
          description: document.getElementById('description').value.trim() || null,
        };
        saveBtn.disabled = true;
        try {
          const id = editId.value ? Number(editId.value) : null;
          if (id) await updateProduct(id, body);
          else await createProduct(body);
          resetForm();
          await refresh();
          showAlert('Đã lưu', 'success');
        } catch (e) {
          showAlert(e.message);
        } finally {
          saveBtn.disabled = false;
        }
      });

      (async () => {
        await guard();
        try {
          await refresh();
        } catch (e) {
          showAlert(e.message);
        }
      })();
    </script>
  </body>
</html>
