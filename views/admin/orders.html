<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShopIMini — Đơn hàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
      <div class="container-fluid">
        <span class="navbar-brand">Admin — Đơn hàng</span>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-light" href="/admin/products">Sản phẩm</a>
          <button type="button" class="btn btn-sm btn-outline-light" id="logout">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      <div id="alert" class="alert d-none" role="alert"></div>
      <div class="table-responsive card shadow-sm">
        <table class="table table-sm align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Khách</th>
              <th>Địa chỉ</th>
              <th>Tổng</th>
              <th>Trạng thái</th>
              <th>Ngày</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Chi tiết đơn</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const alertEl = document.getElementById('alert');
      const tbody = document.getElementById('tbody');
      const detailBody = document.getElementById('detailBody');
      const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

      const statuses = ['pending', 'confirmed', 'shipping', 'completed', 'cancelled'];

      function showAlert(msg, kind = 'danger') {
        alertEl.className = `alert alert-${kind}`;
        alertEl.textContent = msg;
        alertEl.classList.remove('d-none');
      }

      function formatMoney(n) {
        return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(n);
      }

      async function guard() {
        const res = await fetch('/api/admin/session', { credentials: 'include' });
        if (!res.ok) window.location.href = '/admin/login';
      }

      async function fetchOrders() {
        const res = await fetch('/api/admin/orders', { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải đơn hàng');
        return data;
      }

      async function fetchOrder(id) {
        const res = await fetch('/api/admin/orders/' + id, { credentials: 'include' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Không tải chi tiết');
        return data;
      }

      async function patchStatus(id, status) {
        const res = await fetch('/api/admin/orders/' + id, {
          method: 'PATCH',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Không cập nhật trạng thái');
        return data;
      }

      async function logout() {
        await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/admin/login';
      }

      function statusSelect(current, orderId) {
        const opts = statuses
          .map(
            (s) =>
              `<option value="${s}" ${s === current ? 'selected' : ''}>${s}</option>`
          )
          .join('');
        return `<select class="form-select form-select-sm status-select" data-id="${orderId}">${opts}</select>`;
      }

      function render(list) {
        tbody.innerHTML = '';
        for (const o of list) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${o.id}</td>
            <td>${o.customer_name}</td>
            <td class="small text-break" style="max-width:220px">${o.customer_address}</td>
            <td>${formatMoney(o.total)}</td>
            <td style="min-width:140px">${statusSelect(o.status, o.id)}</td>
            <td class="small text-nowrap">${o.created_at}</td>
            <td><button type="button" class="btn btn-sm btn-outline-secondary btn-detail" data-id="${o.id}">Chi tiết</button></td>`;
          tbody.appendChild(tr);
        }
        tbody.querySelectorAll('.status-select').forEach((sel) => {
          sel.addEventListener('change', async () => {
            try {
              await patchStatus(Number(sel.dataset.id), sel.value);
              showAlert('Đã cập nhật trạng thái', 'success');
            } catch (e) {
              showAlert(e.message);
              await refresh();
            }
          });
        });
        tbody.querySelectorAll('.btn-detail').forEach((btn) => {
          btn.addEventListener('click', async () => {
            try {
              const o = await fetchOrder(Number(btn.dataset.id));
              const lines = (o.items || [])
                .map(
                  (i) =>
                    `<li>${i.product_name} × ${i.quantity} @ ${formatMoney(i.price)} = ${formatMoney(
                      i.price * i.quantity
                    )}</li>`
                )
                .join('');
              detailBody.innerHTML = `
                <p><strong>#${o.id}</strong> — ${o.status} — ${o.created_at}</p>
                <p>${o.customer_name}<br/><span class="text-muted">${o.customer_address}</span></p>
                <p class="mb-1">Tổng: <strong>${formatMoney(o.total)}</strong></p>
                <ul class="mb-0">${lines}</ul>`;
              detailModal.show();
            } catch (e) {
              showAlert(e.message);
            }
          });
        });
      }

      async function refresh() {
        alertEl.classList.add('d-none');
        const list = await fetchOrders();
        render(list);
      }

      document.getElementById('logout').addEventListener('click', () => logout());

      (async () => {
        await guard();
        try {
          await refresh();
        } catch (e) {
          showAlert(e.message);
        }
      })();
    </script>
  </body>
</html>
