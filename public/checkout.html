<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán - ShopiMini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fs-4" href="/">🎮 ShopiMini</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="checkout-box">
                <h3 class="fw-bold mb-4 text-center">Hoàn Tất Thanh Toán</h3>
                <form id="checkout-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và Tên</label>
                        <input type="text" class="form-control p-3 rounded-3" id="customer_name" required placeholder="Nhập họ tên...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Địa Chỉ Nhận Hàng</label>
                        <textarea class="form-control p-3 rounded-3" id="customer_address" rows="3" required placeholder="Số nhà, đường, quận..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary-custom py-3 text-uppercase">Đặt Hàng Ngay</button>
                    <div class="text-center mt-3">
                        <a href="/cart.html" class="text-muted">Quay lại giỏ hàng</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('checkout-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const customer_name = document.getElementById('customer_name').value;
        const customer_address = document.getElementById('customer_address').value;
        
        try {
            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ customer_name, customer_address })
            });
            const data = await res.json();
            if (data.success) {
                alert('Đặt hàng thành công! Trân trọng cảm ơn. Mã đơn của bạn là: ' + data.orderId);
                window.location.href = '/';
            } else {
                alert('Có lỗi: ' + data.error);
            }
        } catch(err) {
            console.error(err);
        }
    });
</script>
</body>
</html>
