<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoppimini - Lộng Lẫy & Tinh Tế</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">✨ Shoppimini</a>
        <div class="d-flex position-relative">
            <a href="/cart.html" class="btn btn-light position-relative" style="border-radius: 12px;">
                🛒 Giỏ Hàng
                <span id="cart-badge" class="cart-badge translate-middle">0</span>
            </a>
            <a href="/admin/login.html" class="btn btn-outline-secondary ms-2" style="border-radius: 12px;">Admin</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero-section">
        <h1>Bộ Sưu Tập Mới Nhất</h1>
        <p class="lead">Khám phá các phong cách hiện đại với thiết kế dẫn đầu xu hướng.</p>
    </div>

    <div class="row" id="product-list">
        <!-- Products will be loaded here via JS -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
    async function fetchProducts() {
        try {
            const res = await fetch('/api/products');
            const data = await res.json();
            const productList = document.getElementById('product-list');
            productList.innerHTML = '';

            data.products.forEach(p => {
                const col = document.createElement('div');
                col.className = 'col-lg-4 col-md-6';
                col.innerHTML = `
                    <div class="card product-card">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">${p.name}</h5>
                            <p class="card-text text-muted small">${p.description}</p>
                            <div class="product-price">${formatCurrency(p.price)}</div>
                            <button class="btn btn-primary-custom" onclick="addToCart(${p.id})">Thêm Vào Giỏ</button>
                        </div>
                    </div>
                `;
                productList.appendChild(col);
            });
        } catch(err) {
            console.error(err);
        }
    }
    
    document.addEventListener('DOMContentLoaded', fetchProducts);
</script>
</body>
</html>
