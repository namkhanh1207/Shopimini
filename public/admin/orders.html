<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        fetch('/api/admin/check').then(res => res.json()).then(data => {
            if (!data.loggedIn) window.location.href = '/admin/login.html';
        });
    </script>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg border-bottom" style="border-color: #333 !important;">
    <div class="container">
        <a class="navbar-brand" href="#">🔑 Admin Portal</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/admin/products.html">Sản Phẩm</a>
            <a class="nav-link active" href="/admin/orders.html">Đơn Hàng</a>
            <a class="nav-link text-danger" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="mb-4">
        <h3>Danh Sách Đơn Hàng</h3>
    </div>

    <div class="table-responsive bg-dark p-3 rounded shadow-sm border border-secondary">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th>Mã Đơn</th>
                    <th>Khách hàng</th>
                    <th>Địa chỉ</th>
                    <th>Tổng Tiền</th>
                    <th>Ngày đặt</th>
                </tr>
            </thead>
            <tbody id="admin-order-list"></tbody>
        </table>
    </div>
</div>

<script>
    async function loadOrders() {
        const res = await fetch('/api/admin/orders');
        const data = await res.json();
        const tbody = document.getElementById('admin-order-list');
        tbody.innerHTML = '';
        if(data.orders && data.orders.length > 0) {
            data.orders.forEach(o => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>#${o.id}</strong></td>
                        <td>${o.customer_name}</td>
                        <td>${o.customer_address}</td>
                        <td class="text-danger fw-bold">${Number(o.total_price).toLocaleString('vi-VN')} đ</td>
                        <td>${new Date(o.created_at).toLocaleString('vi-VN')}</td>
                    </tr>
                `;
            });
        } else {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center">Chưa có đơn hàng nào</td></tr>`;
        }
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/api/admin/logout', { method: 'POST' });
        window.location.href = '/admin/login.html';
    });

    loadOrders();
</script>
</body>
</html>
