<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <script>
        fetch('/api/admin/check').then(r=>r.json()).then(d=>{ if(!d.loggedIn) window.location.href='/admin/login.html'; });
    </script>
    <style>
        /* ── Rarity colour map ── */
        .badge-Legendary { background:#7a5a00; color:#FFD700; border:1px solid #FFD700; }
        .badge-Epic      { background:#3d0066; color:#CC88FF; border:1px solid #BB00FF; }
        .badge-Rare      { background:#003b80; color:#80c8ff; border:1px solid #0077FF; }
        .badge-Common    { background:#2a3540; color:#aabbcc; border:1px solid #5a7888; }
        tr.rarity-Legendary { border-left: 4px solid #FFD700; }
        tr.rarity-Epic      { border-left: 4px solid #BB00FF; }
        tr.rarity-Rare      { border-left: 4px solid #0077FF; }
        tr.rarity-Common    { border-left: 4px solid #5a7888; }
        .order-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15); color:#aaa;
                     padding:2px 7px; border-radius:6px; cursor:pointer; font-size:0.8rem; line-height:1; }
        .order-btn:hover { background:rgba(100,100,255,0.25); color:#fff; }
        .order-btn:disabled { opacity:0.2; cursor:default; }
        #filter-bar input, #filter-bar select { background:#1a1f2e; border:1px solid #444; color:#ccc;
                                                 border-radius:8px; padding:6px 12px; font-size:0.88rem; }
        #filter-bar input:focus, #filter-bar select:focus { border-color:#6c6cff; outline:none; }
        .img-thumb { width:52px; height:52px; object-fit:cover; border-radius:8px; }
        .attr-pill { display:inline-block; background:#1e2a38; border:1px solid #3a4f60;
                     color:#88aacc; border-radius:4px; padding:1px 7px; font-size:0.72rem; margin:1px; }
    </style>
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg border-bottom" style="border-color:#2a2a3a !important; background:#10131e;">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">🔑 Admin Portal</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/admin/products.html">Sản Phẩm</a>
            <a class="nav-link" href="/admin/orders.html">Đơn Hàng</a>
            <a class="nav-link text-danger" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">📦 Quản Lý Sản Phẩm <small id="count-badge" class="text-secondary fs-6 ms-2"></small></h3>
        <button class="btn btn-primary" onclick="openAddModal()">+ Thêm Sản Phẩm</button>
    </div>

    <!-- Filter bar -->
    <div id="filter-bar" class="d-flex flex-wrap gap-2 mb-3 p-3 rounded-3" style="background:#111520; border:1px solid #2a2a3a;">
        <input type="text" id="f-name" placeholder="🔍 Tìm tên..." oninput="applyFilter()" style="flex:1; min-width:160px;">
        <select id="f-game" onchange="applyFilter()">
            <option value="">Tất cả Game</option>
            <option value="lienquan">Liên Quân</option>
            <option value="lienminh">Liên Minh</option>
            <option value="gunny">Gunny 360</option>
            <option value="soulknight">Soul Knight</option>
            <option value="pubg">PUBG</option>
            <option value="dragonmania">Dragon Mania</option>
        </select>
        <select id="f-rarity" onchange="applyFilter()">
            <option value="">Tất cả Rarity</option>
            <option value="Legendary">⭐ Legendary</option>
            <option value="Epic">💜 Epic</option>
            <option value="Rare">💙 Rare</option>
            <option value="Common">⬜ Common</option>
        </select>
        <!-- Element filter -->
        <select id="f-element" onchange="applyFilter()">
            <option value="">Tất cả Element</option>
            <option>Weapon</option><option>Physical</option><option>Magic</option>
            <option>Defense</option><option>Support</option><option>Fast</option>
            <option>Lifesteal</option><option>Fire</option><option>Ice</option>
            <option>Mana</option><option>HP</option><option>Speed</option>
            <option>Explosive</option><option>Light</option><option>Dragon</option>
            <option>Skin</option><option>Material</option>
            <option>Vũ khí</option><option>Vật lý</option><option>Phép thuật</option>
            <option>Phòng thủ</option><option>Hỗ trợ</option><option>Tốc đánh</option>
            <option>Hút máu</option><option>Thiêu đốt</option><option>Tốc chạy</option>
            <option>Phản sát thương</option><option>Máu</option><option>Lá chắn</option>
            <option>Hồi phục</option><option>Giải khống</option><option>Kháng phép</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary" onclick="clearFilter()">✕ Xóa lọc</button>
    </div>

    <div class="table-responsive rounded-3 shadow" style="background:#111520; border:1px solid #2a2a3a;">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead style="background:#1a1f2e; font-size:0.78rem; text-transform:uppercase; letter-spacing:.05em; color:#6a7a8a;">
                <tr>
                    <th style="width:80px; text-align:center;">Thứ tự</th>
                    <th style="width:64px;">Ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Game</th>
                    <th>Rarity</th>
                    <th>Elements</th>
                    <th class="text-end">Giá</th>
                    <th class="text-center" style="width:110px;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="product-list"></tbody>
        </table>
    </div>
</div>

<!-- ── Edit / Add Modal ── -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content" style="background:#111520; border:1px solid #3a3a5a;">
      <div class="modal-header" style="border-color:#2a2a4a;">
        <h5 class="modal-title" id="modalTitle">Thêm Sản Phẩm</h5>
        <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form id="product-form" onsubmit="saveProduct(event)">
          <input type="hidden" id="prod-id">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label text-secondary small">Tên sản phẩm</label>
              <input type="text" id="prod-name" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small">Giá (VNĐ)</label>
              <input type="number" id="prod-price" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small">Game</label>
              <select id="prod-game" class="form-select bg-dark text-white border-secondary">
                <option value="">Chung</option>
                <option value="lienquan">Liên Quân</option>
                <option value="lienminh">Liên Minh</option>
                <option value="gunny">Gunny 360</option>
                <option value="soulknight">Soul Knight</option>
                <option value="pubg">PUBG</option>
                <option value="dragonmania">Dragon Mania</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small">Rarity</label>
              <select id="prod-rarity" class="form-select bg-dark text-white border-secondary" onchange="updateRarityPreview()">
                <option value="Common">⬜ Common</option>
                <option value="Rare">💙 Rare</option>
                <option value="Epic">💜 Epic</option>
                <option value="Legendary">⭐ Legendary</option>
              </select>
              <!-- Live colour preview -->
              <div id="rarity-preview" class="mt-2 px-3 py-1 rounded-pill d-inline-block fw-bold" style="font-size:0.8rem;">Common</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small">Required Level</label>
              <input type="number" id="prod-level" class="form-control bg-dark text-white border-secondary" placeholder="Bỏ trống nếu không">
            </div>
            <div class="col-12">
              <label class="form-label text-secondary small">Elements / Attributes <span class="text-muted">(phân cách bởi dấu phẩy)</span></label>
              <input type="text" id="prod-attrs" class="form-control bg-dark text-white border-secondary" placeholder="Vũ khí, Vật lý, Tốc đánh">
            </div>
            <div class="col-12">
              <label class="form-label text-secondary small">Mô tả</label>
              <textarea id="prod-desc" class="form-control bg-dark text-white border-secondary" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label text-secondary small">Link Ảnh (URL)</label>
              <input type="text" id="prod-image" class="form-control bg-dark text-white border-secondary" oninput="updateImagePreview()">
              <img id="img-preview" src="" alt="" class="mt-2 rounded" style="max-height:80px; display:none;">
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary flex-fill">💾 Lưu</button>
            <button type="button" class="btn btn-outline-secondary" onclick="closeModal()">Huỷ</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── State ── */
let allProducts = [];

const RARITY_PREVIEW = {
    Legendary: { bg:'#7a5a00', color:'#FFD700' },
    Epic:      { bg:'#3d0066', color:'#CC88FF' },
    Rare:      { bg:'#003b80', color:'#80c8ff' },
    Common:    { bg:'#2a3540', color:'#aabbcc' },
};

/* ── Load products & render ── */
async function loadProducts() {
    const res = await fetch('/api/products');
    const data = await res.json();
    allProducts = data.products || [];
    renderTable(allProducts);
}

function renderTable(list) {
    document.getElementById('count-badge').textContent = `${list.length} / ${allProducts.length} sản phẩm`;
    const tbody = document.getElementById('product-list');
    tbody.innerHTML = '';
    list.forEach((p, idx) => {
        const rarity = p.rarity || 'Common';
        const rc = RARITY_PREVIEW[rarity] || RARITY_PREVIEW.Common;
        const attrs = Array.isArray(p.attributes) ? p.attributes : [];
        const attrPills = attrs.slice(0,5).map(a => `<span class="attr-pill">${a}</span>`).join('');
        const isFirst = allProducts.indexOf(p) === 0;
        const isLast  = allProducts.indexOf(p) === allProducts.length - 1;
        tbody.innerHTML += `
        <tr class="rarity-${rarity}" id="row-${p.id}">
            <td style="text-align:center; vertical-align:middle;">
                <div class="d-flex flex-column align-items-center gap-1">
                    <button class="order-btn" title="Lên" ${isFirst?'disabled':''} onclick="moveProduct(${p.id},'up')">▲</button>
                    <small style="color:#555; font-size:0.7rem;">${allProducts.indexOf(p)+1}</small>
                    <button class="order-btn" title="Xuống" ${isLast?'disabled':''} onclick="moveProduct(${p.id},'down')">▼</button>
                </div>
            </td>
            <td>
                <div style="position:relative; display:inline-block;">
                    <img src="${p.image||''}" onerror="this.src='https://picsum.photos/seed/${p.id}/60'" class="img-thumb" alt="">
                    <div style="position:absolute;bottom:-4px;right:-4px;width:12px;height:12px;border-radius:50%;background:${rc.color};border:2px solid #111520;box-shadow:0 0 6px ${rc.color};"></div>
                </div>
            </td>
            <td>
                <strong style="font-size:0.9rem;">${p.name}</strong>
                ${p.description ? `<div style="font-size:0.72rem;color:#555;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.description}</div>` : ''}
            </td>
            <td><span style="background:#0d1422;border:1px solid #2a3540;color:#8aabb5;padding:2px 10px;border-radius:999px;font-size:0.75rem;">${p.game||'—'}</span></td>
            <td><span class="badge-${rarity} px-2 py-1 rounded-pill" style="background:${rc.bg};color:${rc.color};border:1px solid ${rc.color}44;font-size:0.75rem;font-weight:700;">${rarity}</span></td>
            <td style="max-width:200px;">${attrPills || '<span style="color:#444;font-size:0.75rem;">—</span>'}</td>
            <td class="text-end text-warning fw-bold">💰 ${Number(p.price).toLocaleString('vi-VN')} đ</td>
            <td class="text-center">
                <div class="d-flex justify-content-center gap-1">
                    <button class="btn btn-sm" style="background:#1a3a6a;color:#80c8ff;" onclick="editProduct(${p.id})">✏️ Sửa</button>
                    <button class="btn btn-sm" style="background:#3a1a1a;color:#ff8080;" onclick="deleteProduct(${p.id})">🗑</button>
                </div>
            </td>
        </tr>`;
    });
}

/* ── Filter (client-side) ── */
function applyFilter() {
    const name    = document.getElementById('f-name').value.toLowerCase();
    const game    = document.getElementById('f-game').value;
    const rarity  = document.getElementById('f-rarity').value;
    const element = document.getElementById('f-element').value.toLowerCase();
    const filtered = allProducts.filter(p => {
        const nm = !name    || p.name.toLowerCase().includes(name);
        const gm = !game    || p.game === game;
        const rm = !rarity  || p.rarity === rarity;
        const attrs = Array.isArray(p.attributes) ? p.attributes : [];
        const em = !element || attrs.some(a => a.toLowerCase().includes(element));
        return nm && gm && rm && em;
    });
    renderTable(filtered);
}

function clearFilter() {
    ['f-name','f-game','f-rarity','f-element'].forEach(id => {
        const el = document.getElementById(id);
        if(el.tagName==='INPUT') el.value=''; else el.value='';
    });
    renderTable(allProducts);
}

/* ── Reorder ── */
async function moveProduct(id, direction) {
    const row = document.getElementById(`row-${id}`);
    if(row) row.style.opacity='0.4';
    await fetch(`/api/admin/products/${id}/order`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction })
    });
    await loadProducts();
}

/* ── Edit modal ── */
const modal = document.getElementById('productModal');

function openAddModal() {
    document.getElementById('prod-id').value = '';
    document.getElementById('product-form').reset();
    document.getElementById('prod-rarity').value = 'Common';
    updateRarityPreview();
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('modalTitle').textContent = '+ Thêm Sản Phẩm';
    new bootstrap.Modal(modal).show();
}

function editProduct(id) {
    const p = allProducts.find(x => x.id === id);
    if(!p) return;
    document.getElementById('prod-id').value     = p.id;
    document.getElementById('prod-name').value   = p.name;
    document.getElementById('prod-price').value  = p.price;
    document.getElementById('prod-desc').value   = p.description || '';
    document.getElementById('prod-image').value  = p.image || '';
    document.getElementById('prod-game').value   = p.game || '';
    document.getElementById('prod-level').value  = p.requiredLevel || '';
    // rarity — normalise legacy Vietnamese values
    const rarityMap = { 'Thường':'Common', 'Hiếm':'Rare', 'Siêu hiếm':'Epic' };
    document.getElementById('prod-rarity').value = rarityMap[p.rarity] || p.rarity || 'Common';
    // attributes
    const attrs = Array.isArray(p.attributes) ? p.attributes.join(', ') : (p.attributes || '');
    document.getElementById('prod-attrs').value = attrs;
    updateRarityPreview();
    updateImagePreview();
    document.getElementById('modalTitle').textContent = '✏️ Sửa: ' + p.name;
    new bootstrap.Modal(modal).show();
}

function closeModal() {
    bootstrap.Modal.getInstance(modal)?.hide();
}

/* ── Live previews ── */
function updateRarityPreview() {
    const rarity = document.getElementById('prod-rarity').value;
    const rc = RARITY_PREVIEW[rarity] || RARITY_PREVIEW.Common;
    const el = document.getElementById('rarity-preview');
    el.textContent = rarity;
    el.style.background = rc.bg;
    el.style.color = rc.color;
    el.style.border = `1px solid ${rc.color}`;
}

function updateImagePreview() {
    const src = document.getElementById('prod-image').value.trim();
    const img = document.getElementById('img-preview');
    if(src) { img.src = src; img.style.display = 'block'; }
    else    { img.style.display = 'none'; }
}

/* ── Save ── */
async function saveProduct(e) {
    e.preventDefault();
    const id = document.getElementById('prod-id').value;
    const rawAttrs = document.getElementById('prod-attrs').value;
    const attributes = rawAttrs.split(',').map(s=>s.trim()).filter(Boolean);
    const payload = {
        name:          document.getElementById('prod-name').value,
        price:         document.getElementById('prod-price').value,
        description:   document.getElementById('prod-desc').value,
        image:         document.getElementById('prod-image').value,
        game:          document.getElementById('prod-game').value,
        rarity:        document.getElementById('prod-rarity').value,
        requiredLevel: document.getElementById('prod-level').value || null,
        attributes,
    };
    const method = id ? 'PUT' : 'POST';
    const url    = id ? `/api/admin/products/${id}` : '/api/admin/products';
    await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    closeModal();
    loadProducts();
}

/* ── Delete ── */
async function deleteProduct(id) {
    if(!confirm('Xoá sản phẩm này?')) return;
    await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
    loadProducts();
}

/* ── Logout ── */
document.getElementById('logout-btn').addEventListener('click', async () => {
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/admin/login.html';
});

loadProducts();
</script>
</body>
</html>
