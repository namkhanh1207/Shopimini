<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        // Check auth
        fetch('/api/admin/check').then(res => res.json()).then(data => {
            if (!data.loggedIn) window.location.href = '/admin/login.html';
        });
    </script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Admin Portal</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/admin/products.html">Sản Phẩm</a>
            <a class="nav-link" href="/admin/orders.html">Đơn Hàng</a>
            <a class="nav-link text-danger" href="#" id="logout-btn">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Quản Lý Sản Phẩm</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="resetForm()">+ Thêm Sản Phẩm</button>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên</th>
                    <th>Giá</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="admin-product-list"></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Thêm Sản Phẩm</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="product-form">
            <input type="hidden" id="prod-id">
            <div class="mb-3">
                <label>Tên</label>
                <input type="text" id="prod-name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Giá (VNĐ)</label>
                <input type="number" id="prod-price" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Mô tả</label>
                <textarea id="prod-desc" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label>Link Ảnh</label>
                <input type="text" id="prod-image" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Lưu</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let productsData = [];

    async function loadProducts() {
        const res = await fetch('/api/products');
        const data = await res.json();
        productsData = data.products;
        const tbody = document.getElementById('admin-product-list');
        tbody.innerHTML = '';
        productsData.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.id}</td>
                    <td><img src="${p.image}" width="50" height="50" style="object-fit:cover; border-radius:5px;"></td>
                    <td>${p.name}</td>
                    <td>${Number(p.price).toLocaleString('vi-VN')} đ</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editProduct(${p.id})">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Xóa</button>
                    </td>
                </tr>
            `;
        });
    }

    function resetForm() {
        document.getElementById('prod-id').value = '';
        document.getElementById('product-form').reset();
        document.getElementById('modalTitle').innerText = 'Thêm Sản Phẩm';
    }

    function editProduct(id) {
        const p = productsData.find(x => x.id === id);
        if(!p) return;
        document.getElementById('prod-id').value = p.id;
        document.getElementById('prod-name').value = p.name;
        document.getElementById('prod-price').value = p.price;
        document.getElementById('prod-desc').value = p.description;
        document.getElementById('prod-image').value = p.image;
        document.getElementById('modalTitle').innerText = 'Sửa Sản Phẩm';
        document.getElementById('productModal').classList.add('show');
        document.getElementById('productModal').style.display = 'block';
    }

    document.getElementById('product-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('prod-id').value;
        const payload = {
            name: document.getElementById('prod-name').value,
            price: document.getElementById('prod-price').value,
            description: document.getElementById('prod-desc').value,
            image: document.getElementById('prod-image').value
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/admin/products/${id}` : '/api/admin/products';

        await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        // Hide modal
        document.getElementById('productModal').classList.remove('show');
        document.getElementById('productModal').style.display = 'none';
        
        loadProducts();
    });

    async function deleteProduct(id) {
        if(!confirm('Bạn có chắc muốn xoá?')) return;
        await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
        loadProducts();
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await fetch('/api/admin/logout', { method: 'POST' });
        window.location.href = '/admin/login.html';
    });

    // Close Modal via Data-Bs-Dismiss manually for simple JS without Bootstrap Object Instances
    document.querySelectorAll('[data-bs-dismiss="modal"]').forEach(btn => {
        btn.onclick = () => {
             document.getElementById('productModal').classList.remove('show');
             document.getElementById('productModal').style.display = 'none';
        }
    });

    loadProducts();
</script>
</body>
</html>
