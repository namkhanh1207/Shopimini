<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - ShopiMini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand fs-4" href="/">🎮 ShopiMini</a>
        <div class="d-flex position-relative">
            <a href="/cart.html" class="btn btn-primary-custom position-relative me-2">
                🛒 Giỏ Hàng
                <span id="cart-badge" class="cart-badge">0</span>
            </a>
            <a href="/admin/login.html" class="btn btn-outline-secondary">Admin</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="fw-bold mb-4">Giỏ Hàng Của Bạn</h2>
    <div class="checkout-box">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Tổng</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="cart-items">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-4">
            <h4 class="fw-bold m-0" id="cart-total">Tổng: 0đ</h4>
            <a href="/checkout.html" class="btn btn-primary-custom w-auto px-5" id="btn-checkout">Thanh Toán</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script>
    async function loadCart() {
        try {
            const res = await fetch('/api/cart');
            const data = await res.json();
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            
            if(!data.cart || data.cart.length === 0) {
                cartItems.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Giỏ hàng rỗng</td></tr>';
                document.getElementById('btn-checkout').style.display = 'none';
                document.getElementById('cart-total').innerText = 'Tổng: 0đ';
                return;
            }

            let total = 0;
            data.cart.forEach(item => {
                total += item.price * item.quantity;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${item.image}" class="cart-item-img me-3">
                            <span class="fw-bold">${item.name}</span>
                        </div>
                    </td>
                    <td>${formatCurrency(item.price)}</td>
                    <td>
                        <input type="number" class="form-control text-center" style="width: 80px;" 
                               value="${item.quantity}" min="1" onchange="updateQuantity(${item.id}, this.value)">
                    </td>
                    <td class="fw-bold text-primary">${formatCurrency(item.price * item.quantity)}</td>
                    <td>
                        <button class="btn btn-sm btn-danger rounded-pill" onclick="updateQuantity(${item.id}, 0)">Xóa</button>
                    </td>
                `;
                cartItems.appendChild(tr);
            });
            document.getElementById('cart-total').innerText = `Tổng: ${formatCurrency(total)}`;
            document.getElementById('btn-checkout').style.display = 'inline-block';
        } catch(err) {
            console.error(err);
        }
    }

    async function updateQuantity(id, quantity) {
        await fetch('/api/cart/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: id, quantity })
        });
        loadCart();
        updateCartBadge();
    }

    document.addEventListener('DOMContentLoaded', loadCart);
</script>
</body>
</html>
